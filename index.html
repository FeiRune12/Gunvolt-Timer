<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
background:radial-gradient(circle at top,#0b0b0b,#000);
color:white;
font-family:Segoe UI;
text-align:center;
margin:0;
}

#title{
font-size:36px;
margin-top:20px;
color:#00ffff;
text-shadow:0 0 15px cyan,0 0 35px cyan;
}

.panel{
margin:auto;
margin-top:20px;
padding:15px;
width:460px;
background:rgba(20,20,20,0.7);
border:1px solid #222;
border-radius:10px;
box-shadow:0 0 20px rgba(0,255,255,0.15);
}

/* SELECTS */

select{
width:130px;
padding:8px;
margin:6px;
background:#0f0f0f;
color:white;
border:1px solid #00ffff55;
border-radius:6px;
outline:none;
font-size:14px;
transition:0.25s;
}

select:hover{
border-color:cyan;
box-shadow:0 0 10px cyan;
}

/* BOTÕES */

button{
padding:8px 18px;
margin:6px;
font-size:15px;
border:none;
border-radius:6px;
cursor:pointer;
transition:0.25s;
}

#startBtn{
background:#00bfff;
color:black;
}

#splitBtn{
background:#00ff88;
color:black;
}

#resetBtn{
background:#ff4444;
color:white;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 12px white;
}

/* TIMER */

#timer{
font-size:82px;
margin-top:15px;
color:#00ffff;
text-shadow:0 0 25px cyan,0 0 50px cyan;
}

#prediction{
margin-top:5px;
color:orange;
font-size:16px;
}

/* SPLITS */

#splits{
width:460px;
margin:auto;
margin-top:20px;
text-align:left;
background:rgba(15,15,15,0.8);
border-radius:8px;
border:1px solid #222;
overflow:hidden;
}

.split{
display:flex;
justify-content:space-between;
padding:7px 10px;
border-bottom:1px solid #1f1f1f;
font-size:14px;
}

.split:nth-child(even){
background:#090909;
}

.current{
color:#00ffff;
font-weight:bold;
background:rgba(0,255,255,0.08);
border-left:4px solid cyan;
}

</style>
</head>

<body>

<div id="title">Gunvolt Speedrun Timer</div>

<div class="panel">

<select id="game">
<option value="">Game</option>
<option value="gv1">Gunvolt 1</option>
<option value="gv2">Gunvolt 2</option>
<option value="gv3">Gunvolt 3</option>
<option value="ix1">Luminous Avenger iX</option>
<option value="ix2">Luminous Avenger iX2</option>
</select>

<select id="category">
<option>Category</option>
</select>

<select id="platform">
<option>PC</option>
<option>PlayStation</option>
<option>Switch</option>
<option>Xbox</option>
</select>

<br>

<button id="startBtn" onclick="startTimer()">Start</button>
<button id="splitBtn" onclick="split()">Split</button>
<button id="resetBtn" onclick="resetTimer()">Reset</button>

<div id="timer">00:00.000</div>
<div id="prediction">Estimated Final Time: --:--</div>

</div>

<div id="splits"></div>

<script>

let startTime
let timerInterval
let currentSplit=0

const gameSelect=document.getElementById("game")
const categorySelect=document.getElementById("category")
const splitDiv=document.getElementById("splits")

const categories={
gv1:["New Game Any%","Trilogy Enhanced"],
gv2:["Any% Gunvolt","Any% Copen","Good Ending"],
gv3:["Bad Ending","Good Ending"],
ix1:["Any%"],
ix2:["Any%"]
}

const stages={

gv1:[
"Sumeragi 1","Merak","Jota","Viper",
"Carrera","Elise","Stratos",
"Urban Run","Eridu","Babel","Firmament"
],

gv2_gv:[
"Seraph","Tenjian 1(GV)","Gibril","Milas",
"Teseo","Tenjian","Ghauri",
"Garden 1","Garden 2","Garden 3"
],

gv2_copen:[
"Downtown","Desna","Asroc",
"Ghauri","Tenjian","Gibril",
"Garden 1","Garden 2","Garden 3"
],

gv2_all:[
"Seraph","Downtown","Tenjian 1(GV)","Gibril",
"Milas","Teseo","Desna","Asroc",
"Ghauri","Tenjian",
"Garden 1","Garden 2","Garden 3","Garden 4"
],

gv3:[
"Primal GV","BB","Shiron","Apollo","Cayman",
"Zed 1","Grazie","Sistina","Prado","Serpentine",
"Palace 1","Palace 2","Palace 3",
"Zed 2","Moebius"
],

ix1:[
"City Slums","Store Ruins","Sumeragi Buiding 13",
"Auto-fab Plant","Medical Center",
"Radio Tower Artemis","Data Center Alpha",
"Data Center Beta","City Slums 2",
"Bunker 1","Bunker 2","Bunker 3"
],

ix2:[
"Pillar Outskirts","Volcano Block","Jungle Block",
"Upper Stratum","Laboratory Block",
"Industrial Block","Arctic Block",
"Top Floor","Entrance Top Floor",
"Hanging Garden","Hanging Garden 2"
]

}

gameSelect.addEventListener("change",loadCategories)
categorySelect.addEventListener("change",loadSplits)

function loadCategories(){

let game=gameSelect.value

categorySelect.innerHTML=""
splitDiv.innerHTML=""
currentSplit=0

if(!categories[game]) return

categories[game].forEach(c=>{

let option=document.createElement("option")
option.textContent=c
option.value=c
categorySelect.appendChild(option)

})

loadSplits()

}

function loadSplits(){

let game=gameSelect.value
let category=categorySelect.value

splitDiv.innerHTML=""
currentSplit=0

let list=[]

if(game==="gv2"){

if(category==="Any% Gunvolt") list=stages.gv2_gv
else if(category==="Any% Copen") list=stages.gv2_copen
else list=stages.gv2_all

}

else{

list=stages[game]

}

if(!list) return

list.forEach(stage=>{

let div=document.createElement("div")
div.className="split"
div.innerHTML=`<span>${stage}</span><span>-</span>`

splitDiv.appendChild(div)

})

highlight()

}

function highlight(){

let splits=document.querySelectorAll(".split")

splits.forEach(s=>s.classList.remove("current"))

if(splits[currentSplit])
splits[currentSplit].classList.add("current")

}

function startTimer(){

if(timerInterval) return

startTime=Date.now()

timerInterval=setInterval(()=>{

let t=Date.now()-startTime

let m=Math.floor(t/60000)
let s=Math.floor((t%60000)/1000)
let ms=t%1000

document.getElementById("timer").textContent=
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0")+"."+
String(ms).padStart(3,"0")

},10)

}

function split(){

let time=document.getElementById("timer").textContent
let splits=document.querySelectorAll(".split")

if(!splits[currentSplit]) return

splits[currentSplit].children[1].textContent=time

currentSplit++

updatePrediction()

if(currentSplit===splits.length){

clearInterval(timerInterval)
document.getElementById("prediction").textContent="Run Finished!"

}

highlight()

}

function resetTimer(){

clearInterval(timerInterval)
timerInterval=null

document.getElementById("timer").textContent="00:00.000"
document.getElementById("prediction").textContent="Estimated Final Time: --:--"

let splits=document.querySelectorAll(".split")

splits.forEach(s=>{
s.children[1].textContent="-"
})

currentSplit=0
highlight()

}

function updatePrediction(){

let splits=document.querySelectorAll(".split")

if(currentSplit===0) return

let totalTime=Date.now()-startTime
let avg=totalTime/currentSplit
let predicted=avg*splits.length

let m=Math.floor(predicted/60000)
let s=Math.floor((predicted%60000)/1000)

document.getElementById("prediction").textContent=
"Estimated Final Time: "+
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0")

}

document.addEventListener("keydown",function(e){

if(e.key==="1") startTimer()
if(e.key==="2") split()
if(e.key==="3") resetTimer()

})

</script>

</body>
</html>
